syntax = "proto3";

package Protocol;

// 로그인 결과 코드. S_LOGIN.result 에 담겨 클라로 전달된다.
enum ELoginResult {
	LR_SUCCESS                = 0;
	LR_INVALID_CREDENTIALS    = 1; // 기존 계정 + 틀린 비밀번호.
	LR_ALREADY_LOGGED_IN      = 2; // 같은 Account.Id 로 활성 세션이 이미 존재.
	LR_INVALID_REQUEST_FORMAT = 3; // id/pw 가 비었거나 NVARCHAR(32) 초과.
	LR_DB_ERROR               = 4; // DB 쿼리 실패(연결/권한/스키마 이상).
}

// Client -> Server: Login request. is_bot=true 면 DB/중복 체크를 스킵하고 메모리 전용 세션으로 진입 (LoadBot 전용).
message C_LOGIN {
	string id = 1;
	string pw = 2;
	bool is_bot = 3;
}

// Server -> Client: Login response. 성공 시 후속으로 S_ENTER_GAME 이 연속 전송된다(M4.5 경로).
message S_LOGIN {
	uint32 result  = 1; // ELoginResult 값.
	uint64 user_id = 2;
}

// 플레이어 코스메틱 캐릭터 종류. 스탯/행동 동일, 스프라이트만 다름. 서버가 입장 시 자동 배정한다.
enum CharacterType {
	CT_DEFAULT = 0;
	CT_FEMALE  = 1;
	CT_DWARF   = 2;
}

// 필드의 다른 플레이어 스냅샷. S_ENTER_GAME 응답에 기존 접속자 목록으로 내려간다.
message PlayerInfo {
	uint64 player_id = 1;
	int32  tile_x    = 2;
	int32  tile_y    = 3;
	CharacterType character_type = 4;
}

// 몬스터 스냅샷. S_ENTER_GAME 응답에 현재 Level 의 몬스터 목록으로 내려간다.
message MonsterInfo {
	uint64 monster_id = 1;
	int32  tile_x     = 2;
	int32  tile_y     = 3;
}

// Client -> Server: 필드 입장 요청. 현 스코프에서는 Session 기반으로 서버가 PlayerID를 발급하므로 payload는 비워 둔다(향후 확장용).
message C_ENTER_GAME {
}

// Server -> Client: 필드 입장 응답. 본인의 PlayerID와 스폰 좌표, 기존 플레이어 목록, 몬스터 목록을 함께 전달한다.
// room_id 는 배정된 Level 인덱스를 클라이언트에 알려 준다.
message S_ENTER_GAME {
	uint64 player_id = 1;
	int32  tile_x    = 2;
	int32  tile_y    = 3;
	repeated PlayerInfo others = 4;
	uint32 room_id   = 5;
	repeated MonsterInfo monsters = 6;
	float  move_speed = 7;
	CharacterType character_type = 8;
}

// Server -> Client: 신규 플레이어 입장 브로드캐스트. 기존 접속자들에게만 송신한다(본인 제외).
message S_SPAWN {
	uint64 player_id = 1;
	int32  tile_x    = 2;
	int32  tile_y    = 3;
	CharacterType character_type = 4;
}

// 타일 이동 4방향. 대각 이동 없음.
enum Direction {
	DIR_UP    = 0;
	DIR_DOWN  = 1;
	DIR_LEFT  = 2;
	DIR_RIGHT = 3;
}

// Client -> Server: 한 칸 이동 요청 (Client Prediction 모델).
// 클라는 이 패킷 송신 전후로 즉시 로컬 예측 이동을 수행한다. 서버는 Direction 만으로 다음 타일을 자체 계산·검증한다.
message C_MOVE {
	Direction dir        = 1;
	uint64    client_seq = 2;
}

// Server -> Client: 이동 확정 브로드캐스트. 레벨 내 모든 세션(이동자 포함)에 송신한다.
// 이동자 본인은 자신이 보낸 client_seq 와 일치하면 이미 예측 이동을 마쳤으므로 스냅샷 큐에서 팝만 수행하고 시각적 반영은 하지 않는다.
message S_MOVE {
	uint64    player_id  = 1;
	int32     tile_x     = 2;
	int32     tile_y     = 3;
	Direction dir        = 4;
	uint64    client_seq = 5;
}

// Server -> Client: 이동 거절 회신. 인접 타일/충돌/범위 검증 실패 시 요청자에게만 단일 전송된다.
// last_accepted_seq 는 서버가 마지막으로 수락한 client_seq 로, 클라는 이를 기준으로 스냅샷 큐를 clip 하고 tile_x/tile_y 로 권위 좌표를 롤백한다.
message S_MOVE_REJECT {
	uint64 player_id         = 1;
	int32  tile_x            = 2;
	int32  tile_y            = 3;
	uint64 client_seq        = 4;
	uint64 last_accepted_seq = 5;
}

// Server -> Client: 몬스터 스폰. GameRoom 초기화 시 및 신규 플레이어 입장 시 해당 클라에게 송신한다.
message S_MONSTER_SPAWN {
	uint64 monster_id = 1;
	int32  tile_x     = 2;
	int32  tile_y     = 3;
}

// Server -> Client: 몬스터 이동 확정 브로드캐스트. 서버가 A*로 결정한 다음 타일로 이동할 때 송신한다.
message S_MONSTER_MOVE {
	uint64 monster_id = 1;
	int32  tile_x     = 2;
	int32  tile_y     = 3;
}

// Server -> Client: 몬스터 공격 브로드캐스트. 맨해튼 거리 <= 1 인 순간 송신한다.
message S_MONSTER_ATTACK {
	uint64 monster_id = 1;
	uint64 target_player_id = 2;
}

// Server -> Client: 플레이어 HP 차감 브로드캐스트. 몬스터 공격 명중 시 송신한다.
message S_PLAYER_DAMAGED {
	uint64 player_id  = 1;
	int32  hp         = 2;
	int32  max_hp     = 3;
}

// Server -> Client: 플레이어 사망 브로드캐스트. HP <= 0 이 된 순간 송신한다.
message S_PLAYER_DIED {
	uint64 player_id = 1;
}

// Client -> Server: 공격 요청. 페이로드 없음 — 서버가 발신 PlayerID + 서버 측 LastDir 로 1칸 앞 타일을 산출하여 권위적으로 처리한다.
message C_ATTACK {
	uint64 client_seq = 1;
}

// Server -> Client: 몬스터 HP 차감 브로드캐스트. 플레이어 공격 명중 시 송신한다.
message S_MONSTER_DAMAGED {
	uint64 monster_id = 1;
	int32  hp         = 2;
	int32  max_hp     = 3;
}

// Server -> Client: 몬스터 사망 브로드캐스트. HP <= 0 이 된 순간 송신하며 클라는 해당 몬스터를 월드에서 제거한다.
message S_MONSTER_DIED {
	uint64 monster_id = 1;
}

// Server -> Client: 포탈을 통한 Level 전이. 클라는 수신 시 로컬 월드 상태를 비우고 new_level_id 기준으로 재초기화한 뒤 후속 S_ENTER_GAME 을 대기한다.
// 본인에게만 단일 전송 — 전환 대상 세션 외 다른 플레이어들에게는 S_PLAYER_LEFT / S_SPAWN 브로드캐스트로 가시성을 조정한다.
message S_PORTAL_TELEPORT {
	uint32 new_level_id = 1;
	int32  spawn_tile_x = 2;
	int32  spawn_tile_y = 3;
}

// Server -> Client: 같은 Level 에서 플레이어가 퇴장(또는 Portal 로 다른 Level 로 이동)한 사실을 남은 세션들에게 알린다.
message S_PLAYER_LEFT {
	uint64 player_id = 1;
}

// Server -> Client: 플레이어 공격 액션 브로드캐스트. C_ATTACK 수신 시 공격자 본인 제외 같은 Level 의 다른 세션에 송신한다.
// 방향은 수신 클라에서 해당 APlayerActor 의 현재 Facing 을 사용하여 애니메이션만 재생한다.
message S_PLAYER_ATTACK {
	uint64 player_id = 1;
}